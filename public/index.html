<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Faster connection setup for CDNs (does not change UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

    <!-- LCP: discover banner image in initial HTML (React paints later) -->
    <link
      rel="preload"
      as="image"
      href="%PUBLIC_URL%/assets/images/banner/banner.webp"
      fetchpriority="high"
      type="image/webp"
    />

    <!--
      Critical CSS stays render-blocking so first paint matches the live UI.
      Third-party / widget CSS is loaded async (same files, same styles).
    -->
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/style.css" />
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/responsive.css" />
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/mobile-nav.css" />

    <!-- Preload critical latin fonts early to cut font-swap CLS (same faces, same look) -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="https://fonts.gstatic.com/s/bebasneue/v16/JTUSjIg69CK48gW7PXoo9WlhyyTh89Y.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="https://fonts.gstatic.com/s/monasans/v4/o-0bIpQmx24alC5A4PNB6Ryti20_6n1iPHjc5a7du3mhPy0.woff2"
    />

    <!-- Google Fonts: upright variable only (same look; drops unused italic axis) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mona+Sans:wght@200..900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mona+Sans:wght@200..900&display=swap"
      />
    </noscript>

    <!--
      Icons + carousel/lightbox CSS: same files/same look, non-blocking for FCP/LCP.
      media=print + onload is the standard pattern — styles apply fully once loaded.
    -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@5.0.7/dist/fancybox/fancybox.css"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      />
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@5.0.7/dist/fancybox/fancybox.css"
      />
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
      />
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css"
      />
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"
      />
    </noscript>

    <title>Award-Winning San Jose Logo Design &amp; Branding Agency</title>
    <meta
      name="description"
      content="Custom logo design, branding, web design &amp; SEO in San Jose. We've helped businesses grow revenue by 255%+ through strategic designs and marketing."
    />
    <meta name="robots" content="index,follow" />
    <meta name="googlebot" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <meta name="bingbot" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <link rel="canonical" href="https://sanjoselogodesign.com" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Award-Winning San Jose Logo Design &amp; Branding Agency" />
    <meta
      property="og:description"
      content="Custom logo design, branding, web design &amp; SEO in San Jose. We've helped businesses grow revenue by 255%+ through strategic designs and marketing."
    />
    <meta property="og:url" content="https://sanjoselogodesign.com" />
    <meta property="og:site_name" content="Sanjoselogodesign" />
    <meta property="og:image" content="https://sanjoselogodesign.com/images/sanjoseog.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Award-Winning San Jose Logo Design &amp; Branding Agency" />
    <meta
      name="twitter:description"
      content="Custom logo design, branding, web design &amp; SEO in San Jose. We've helped businesses grow revenue by 255%+ through strategic designs and marketing."
    />
    <script src="%PUBLIC_URL%/seo-boot.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Widget libs: deferred so they don't compete with first paint (order preserved) -->
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    ></script>
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@5.0.7/dist/fancybox/fancybox.umd.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"
    ></script>

          fbq('init', '986059304336051');

        events.forEach(function (e) {

      })();
    </script>
  </body>
</html>
